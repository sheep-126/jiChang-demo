<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首都机场T3语音导航</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
        html,body{width:100vw;height:100vh;overflow:hidden;background:#eef7fc}
        .container{width:100vw;height:100vh;display:flex;padding:15px;gap:15px}
        
        /* 左侧整体：功能区 + 地图 = 2:3 */
        .left-panel{
            flex: 5; /* 功能2 + 地图3 = 5 */
            display: flex;
            flex-direction: column;
            gap:15px;
        }

        /* 功能区占 2 份 */
        .func-section{
            flex: 2;
            background:#fff;
            border-radius:18px;
            padding:20px;
            box-shadow:0 4px 12px rgba(0,0,0,.08);
            display:flex;
            flex-direction:column;
        }
        .title{
            font-size:22px;
            color:#005792;
            text-align:center;
            margin-bottom:15px;
            font-weight:600;
        }
        .func-grid{
            flex:1;
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:10px;
        }
        .func-btn{
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            border:none;
            border-radius:12px;
            background:#005792;
            color:#fff;
            cursor:pointer;
            transition:all .2s;
            font-size:14px;
        }
        .func-btn:hover{transform:scale(1.03)}
        .func-btn-checkin{grid-column:span 2;background:#ff6a00}
        .func-icon{font-size:26px;margin-bottom:6px}

        /* 地图占 3 份 —— 放大显示 */
        .map-section{
            flex: 3;
            background:#fff;
            border-radius:18px;
            padding:15px;
            box-shadow:0 4px 12px rgba(0,0,0,.08);
            display:flex;
            flex-direction:column;
        }
        .map-title{
            font-size:16px;
            color:#005792;
            text-align:center;
            margin-bottom:10px;
            font-weight:600;
        }
        .airport-map-container{
            flex:1;
            position:relative;
            background:url("image/t3-map.jpg") center/cover no-repeat;
            border-radius:10px;
            overflow:hidden;
            border:1px solid #eee;
        }

        /* 点位放大更清晰 */
        .map-point {
            position:absolute;
            width:32px;
            height:32px;
            border-radius:50%;
            transform:translate(-50%,-50%);
            z-index:5;
            opacity:0;
            transition:all .3s;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#fff;
            font-size:16px;
        }
        .map-point.show{opacity:1;animation:pulse 1.5s infinite ease-in-out}
        @keyframes pulse{0%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.3)}100%{transform:translate(-50%,-50%) scale(1)}}

        .point-checkin{background:#ff6a00;box-shadow:0 0 12px #ff6a00}
        .point-security{background:#f44336;box-shadow:0 0 12px #f44336}
        .point-gate{background:#4caf50;box-shadow:0 0 12px #4caf50}
        .point-toilet{background:#2196f3;box-shadow:0 0 12px #2196f3}
        .point-shop{background:#9c27b0;box-shadow:0 0 12px #9c27b0}
        .point-restaurant{background:#ff9800;box-shadow:0 0 12px #ff9800}
        .point-baggage{background:#00bcd4;box-shadow:0 0 12px #00bcd4}
        .point-lost{background:#795548;box-shadow:0 0 12px #795548}
        .point-special{background:#e91e63;box-shadow:0 0 12px #e91e63}
        .point-transport{background:#673ab7;box-shadow:0 0 12px #673ab7}
        .point-waiting{background:#009688;box-shadow:0 0 12px #009688}

        .map-route-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4}
        .route-line{
            position:absolute;
            background:linear-gradient(90deg, #ff6a00, #f44336);
            height:7px;
            border-radius:4px;
            transform-origin:left center;
            opacity:0;
            transition:opacity .5s, width .8s ease-in-out;
        }
        .route-line.show{opacity:.9}

        .ctrl-btns{height:60px;display:flex;gap:15px;align-items:center;justify-content:center}
        .mic-btn-ctrl{width:60px;height:60px;border-radius:50%;border:none;background:#005792;color:#fff;font-size:26px;cursor:pointer}
        .mic-btn-ctrl.active{background:#f44336;transform:scale(1.1)}
        .stop-btn{padding:10px 20px;border:none;border-radius:8px;background:#f44336;color:#fff;cursor:pointer}

        /* 右侧聊天 */
        .right-panel{width:420px;background:#fff;border-radius:18px;padding:20px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
        .chat-box{height:100%;overflow-y:auto}
        .chat-bubble{max-width:85%;padding:10px 14px;border-radius:14px;margin:8px 0;font-size:14px}
        .user-bubble{background:#005792;color:#fff;margin-left:auto}
        .system-bubble{background:#f8f9fa;color:#333;margin-right:auto;border:1px solid #eee}
        .permission-bubble{background:#fff3e0;color:#ff6a00;border-left:3px solid #ff6a00}
    </style>
</head>
<body>
<div class="container">
    <div class="left-panel">
        <div class="func-section">
            <div class="title">✈️ 首都机场 T3 语音导航</div>
            <div class="func-grid">
                <button class="func-btn func-btn-checkin" data-cmd="checkin">
                    <div class="func-icon">🛄</div><div>值机柜台</div>
                </button>
                <button class="func-btn" data-cmd="security">
                    <div class="func-icon">🔍</div><div>安检区</div>
                </button>
                <button class="func-btn" data-cmd="gate">
                    <div class="func-icon">🚪</div><div>登机口A12</div>
                </button>
                <button class="func-btn" data-cmd="restaurant">
                    <div class="func-icon">🍽️</div><div>餐厅</div>
                </button>
                <button class="func-btn" data-cmd="toilet">
                    <div class="func-icon">🚻</div><div>卫生间</div>
                </button>
                <button class="func-btn" data-cmd="shop">
                    <div class="func-icon">🛍️</div><div>免税店</div>
                </button>
                <button class="func-btn" data-cmd="baggage">
                    <div class="func-icon">🧳</div><div>行李提取</div>
                </button>
                <button class="func-btn" data-cmd="lost">
                    <div class="func-icon">🔎</div><div>失物招领</div>
                </button>
                <button class="func-btn" data-cmd="special">
                    <div class="func-icon">👴</div><div>特殊旅客</div>
                </button>
                <button class="func-btn" data-cmd="transport">
                    <div class="func-icon">🚌</div><div>交通中心</div>
                </button>
            </div>
        </div>

        <div class="map-section">
            <div class="map-title">📍 首都机场 T3 航站楼 · 精准指引</div>
            <div class="airport-map-container" id="mapContainer">
                <div class="map-route-layer" id="routeLayer"></div>
            </div>
        </div>

        <div class="ctrl-btns">
            <button class="stop-btn" id="stopBtn">⏹️ 停止播报</button>
            <button class="mic-btn-ctrl" id="micBtn">🎤</button>
        </div>
    </div>

    <div class="right-panel">
        <div class="chat-box" id="chatBox">
            <div class="chat-bubble system-bubble">✈️ 首都机场 T3 语音导航已就绪</div>
            <div class="chat-bubble system-bubble">🗣️ 支持语音：值机、安检、登机口、卫生间等</div>
            <div class="chat-bubble permission-bubble">💡 Edge 浏览器可直接使用语音识别</div>
        </div>
    </div>
</div>

<script>
// 完全保留你原来的 Web Speech API，不改动逻辑
const LOCATION_COORDS = {
    'T3中心':      { top: '50%', left: '50%', type: 'checkin', icon: '📍' },
    '值机柜台':    { top: '40%', left: '42%', type: 'checkin', icon: '🛄' },
    '安检区':      { top: '48%', left: '52%', type: 'security', icon: '🔍' },
    '登机口A12':   { top: '62%', left: '68%', type: 'gate', icon: '🚪' },
    '餐厅':        { top: '32%', left: '28%', type: 'restaurant', icon: '🍽️' },
    '行李提取':    { top: '72%', left: '45%', type: 'baggage', icon: '🧳' },
    '失物招领':    { top: '26%', left: '22%', type: 'lost', icon: '🔎' },
    '特殊旅客':    { top: '38%', left: '48%', type: 'special', icon: '👴' },
    '卫生间':      { top: '52%', left: '62%', type: 'toilet', icon: '🚻' },
    '免税店':      { top: '34%', left: '60%', type: 'shop', icon: '🛍️' },
    '候机区':      { top: '68%', left: '72%', type: 'waiting', icon: '⏳' },
    '交通中心':    { top: '76%', left: '20%', type: 'transport', icon: '🚌' }
};

const CMD_MAP = {
    checkin: { name: '值机柜台', desc: '值机柜台位于3号门区域，请提前2小时办理登机牌及行李托运。', route: null },
    security: { name: '安检区', desc: '安检通道在值机柜台后方50米处，请提前取出电脑、充电宝等物品。', route: { from: '值机柜台', to: '安检区' } },
    gate: { name: '登机口A12', desc: '登机口A12位于安检区右侧，步行约3分钟，建议提前30分钟到达。', route: { from: '安检区', to: '登机口A12' } },
    restaurant: { name: '餐厅', desc: '餐厅位于航站楼2层西侧，提供中西餐、咖啡及简餐，营业时间6:00-22:00。', route: null },
    toilet: { name: '卫生间', desc: '卫生间位于安检区右侧10米处，二楼设有母婴室及无障碍卫生间。', route: null },
    shop: { name: '免税店', desc: '免税店位于2层候机区，涵盖美妆、烟酒、奢侈品等，支持支付宝/微信支付。', route: null },
    baggage: { name: '行李提取', desc: '行李提取区位于1层到达大厅，按航班号查找对应转盘，提取后可前往交通中心。', route: null },
    lost: { name: '失物招领', desc: '失物招领处位于1层服务台旁，联系电话：010-64599567，工作时间8:00-20:00。', route: null },
    special: { name: '特殊旅客', desc: '特殊旅客服务台位于值机大厅右侧，提供轮椅、母婴室、优先登机等服务。', route: null },
    transport: { name: '交通中心', desc: '交通中心包含机场大巴、出租车、地铁，机场快轨直达市区。', route: null },
    waiting: { name: '候机区', desc: '候机区位于各登机口旁，提供充电、饮水、休息区等服务。', route: null }
};

const KEYWORDS = {
    checkin: ['值机','登机牌','托运行李','办票'],
    security: ['安检','安全检查','过安检'],
    gate: ['登机口','A12','上飞机','登机'],
    restaurant: ['餐厅','吃饭','饿了','咖啡'],
    toilet: ['卫生间','厕所','洗手间'],
    shop: ['免税店','购物','买东西'],
    baggage: ['行李','提取','行李领取'],
    lost: ['失物','招领','丢东西'],
    special: ['特殊旅客','轮椅','老人','母婴'],
    transport: ['交通','大巴','出租车','地铁','快轨'],
    waiting: ['候机区','等待','休息']
};

function addMessage(text, type='system') {
    const box = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = `chat-bubble ${type}-bubble`;
    div.innerText = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function speakText(text) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    u.rate = 1;
    window.speechSynthesis.speak(u);
}

function clearMap() {
    document.getElementById('routeLayer').innerHTML = '';
    document.querySelectorAll('.map-point').forEach(p => p.remove());
}

function addMapPoint(name) {
    const loc = LOCATION_COORDS[name];
    if (!loc) return;
    const p = document.createElement('div');
    p.className = `map-point point-${loc.type}`;
    p.style.top = loc.top;
    p.style.left = loc.left;
    p.innerText = loc.icon;
    document.getElementById('mapContainer').appendChild(p);
    setTimeout(()=>p.classList.add('show'), 100);
}

function drawRoute(fromName, toName) {
    const f = LOCATION_COORDS[fromName];
    const t = LOCATION_COORDS[toName];
    if (!f || !t) return;
    const layer = document.getElementById('routeLayer');
    const line = document.createElement('div');
    line.className = 'route-line';
    const r = document.querySelector('.airport-map-container').getBoundingClientRect();
    const fx = (parseFloat(f.left)/100)*r.width;
    const fy = (parseFloat(f.top)/100)*r.height;
    const tx = (parseFloat(t.left)/100)*r.width;
    const ty = (parseFloat(t.top)/100)*r.height;
    const len = Math.hypot(tx-fx, ty-fy);
    const ang = Math.atan2(ty-fy, tx-fx)*180/Math.PI;
    line.style.left = fx+'px';
    line.style.top = fy+'px';
    line.style.width = '0px';
    line.style.transform = `rotate(${ang}deg)`;
    layer.appendChild(line);
    setTimeout(()=>{ line.style.width = len+'px'; line.classList.add('show'); },300);
}

function handleCommand(inputText, isButton=false) {
    clearMap();
    let cmd = '';
    if (isButton) {
        cmd = inputText;
        addMessage(`选择：${CMD_MAP[cmd].name}`, 'user');
    } else {
        addMessage(inputText, 'user');
        for (const [c, ks] of Object.entries(KEYWORDS)) {
            if (ks.some(w=>inputText.includes(w))) { cmd = c; break; }
        }
    }
    if (!cmd || !CMD_MAP[cmd]) {
        addMessage('❌ 未识别，请说：安检、值机、登机口、卫生间', 'system');
        speakText('我没听懂，请说安检、值机、登机口等');
        return;
    }
    const cfg = CMD_MAP[cmd];
    addMessage(cfg.desc, 'system');
    speakText(cfg.desc);
    addMapPoint(cfg.name);
    if (cfg.route) {
        addMapPoint(cfg.route.from);
        addMapPoint(cfg.route.to);
        drawRoute(cfg.route.from, cfg.route.to);
    }
}

function initVoiceRecognition() {
    const mic = document.getElementById('micBtn');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        addMessage('⚠️ 浏览器不支持语音识别，请点击按钮', 'permission');
        mic.onclick = ()=>{
            const t = prompt('输入指令：安检、值机、登机口');
            if(t) handleCommand(t);
        };
        return;
    }
    const rec = new SpeechRecognition();
    rec.lang = 'zh-CN';
    rec.continuous = false;
    rec.interimResults = false;
    let listening = false;

    rec.onresult = e=>{
        const text = e.results[0][0].transcript.trim();
        handleCommand(text);
        mic.classList.remove('active');
        listening = false;
    };
    rec.onerror = e=>{
        addMessage(`❌ 语音错误：${e.error}，请重试`, 'system');
        mic.classList.remove('active');
        listening = false;
    };
    rec.onend = ()=>{ mic.classList.remove('active'); listening = false; };

    mic.onmousedown = e=>{
        e.preventDefault();
        if(listening) return;
        rec.start();
        listening = true;
        mic.classList.add('active');
        addMessage('🎤 正在倾听…', 'system');
    };
    mic.onmouseup = ()=>{ if(listening){ rec.stop(); listening=false; } };
    mic.onmouseleave = ()=>{ if(listening){ rec.stop(); listening=false; } };
}

document.addEventListener('DOMContentLoaded', ()=>{
    initVoiceRecognition();
    document.querySelectorAll('.func-btn').forEach(btn=>{
        btn.addEventListener('click',()=>handleCommand(btn.dataset.cmd, true));
    });
    document.getElementById('stopBtn').onclick = ()=>{
        window.speechSynthesis.cancel();
        addMessage('⏹️ 已停止播报', 'system');
    };
    setTimeout(()=>addMapPoint('T3中心'), 1000);
});
</script>
</body>
</html>
