<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首都机场T3航站楼 · 语音地图指引</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
        html,body{width:100vw;height:100vh;overflow:hidden;background:#eef7fc}
        .container{width:100vw;height:100vh;display:flex;padding:15px;gap:15px}
        .left-panel{flex:1;background:#fff;border-radius:18px;padding:20px;display:flex;flex-direction:column;box-shadow:0 4px 12px rgba(0,0,0,.08)}
        .title{font-size:24px;color:#005792;text-align:center;margin-bottom:15px;font-weight:600}
        .func-section{margin-bottom:15px}
        .func-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
        .func-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;border:none;border-radius:12px;background:#005792;color:#fff;padding:10px;height:80px}
        .func-btn-checkin{grid-column:span 2;background:#ff6a00}
        .func-icon{font-size:24px;margin-bottom:4px}
        .func-text{font-size:13px}

        /* 地图容器（核心） */
        .map-section{flex:1;position:relative}
        .map-panel{height:100%;background:#fff;border-radius:12px;padding:10px;position:relative;border:1px solid #00579233}
        .map-title{font-size:16px;color:#005792;text-align:center;margin-bottom:8px;font-weight:600}

        /* 真实T3航站楼平面图（使用高清机场图） */
        .airport-map-container{
            width:100%;
            height:calc(100% - 30px);
            position:relative;
            background:url("https://img0.baidu.com/it/u=1871115033,3820222972&fm=253&fmt=auto&app=138&f=JPEG?w=800&h=500") center/contain no-repeat;
            border-radius:10px;
            overflow:hidden;
        }

        /* 点位样式 */
        .map-point {
            position:absolute;
            width:20px;
            height:20px;
            border-radius:50%;
            transform:translate(-50%,-50%);
            z-index:5;
            opacity:0;
            transition:all .3s;
        }
        .map-point.show{opacity:1;animation:pulse 1.5s infinite ease-in-out}
        @keyframes pulse{0%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.2)}}

        /* 不同类型点位配色 */
        .point-checkin{background:#ff6a00;box-shadow:0 0 8px #ff6a00}
        .point-security{background:#f44336;box-shadow:0 0 8px #f44336}
        .point-gate{background:#4caf50;box-shadow:0 0 8px #4caf50}
        .point-toilet{background:#2196f3;box-shadow:0 0 8px #2196f3}
        .point-shop{background:#9c27b0;box-shadow:0 0 8px #9c27b0}
        .point-restaurant{background:#ff9800;box-shadow:0 0 8px #ff9800}
        .point-baggage{background:#00bcd4;box-shadow:0 0 8px #00bcd4}
        .point-lost{background:#795548;box-shadow:0 0 8px #795548}
        .point-special{background:#e91e63;box-shadow:0 0 8px #e91e63}
        .point-transport{background:#673ab7;box-shadow:0 0 8px #673ab7}
        .point-waiting{background:#009688;box-shadow:0 0 8px #009688}

        /* 路线样式 */
        .map-route-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4}
        .route-line{
            position:absolute;
            background:#f44336;
            height:4px;
            border-radius:2px;
            transform-origin:left center;
            opacity:0;
            transition:opacity .5s,width .8s;
        }
        .route-line.show{opacity:.8}

        .ctrl-btns{display:flex;gap:15px;justify-content:center;align-items:center;height:60px}
        .mic-btn-ctrl{width:60px;height:60px;border-radius:50%;border:none;background:#005792;color:#fff;font-size:24px;cursor:pointer}
        .mic-btn-ctrl.active{background:#f44336;animation:scale .3s}
        @keyframes scale{0%{transform:scale(1)}50%{transform:scale(1.1)}}

        .right-panel{width:420px;background:#fff;border-radius:18px;padding:15px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
        .chat-box{height:100%;overflow-y:auto}
        .chat-bubble{max-width:85%;padding:10px 14px;border-radius:14px;margin:8px 0;font-size:14px}
        .user-bubble{background:#005792;color:#fff;margin-left:auto}
        .system-bubble{background:#f8f9fa;color:#333;margin-right:auto}
    </style>
</head>

<script>

};

// ========== 工具函数 ==========
function addMessage(text, type='system') {
    const box = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = `chat-bubble ${type}-bubble`;
    div.innerText = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function speak(text) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    window.speechSynthesis.speak(u);
}

// ========== 地图操作 ==========
function clearMap() {
    document.getElementById('routeLayer').innerHTML = '';
    const points = document.querySelectorAll('.map-point');
    points.forEach(p=>p.remove());
}

// 添加点位
function addPoint(name) {
    const loc = LOCATION_COORDS[name];
    if(!loc) return;

    const div = document.createElement('div');
    div.className = `map-point show point-${loc.type}`;
    div.style.top = loc.top;
    div.style.left = loc.left;
    div.title = name;
    document.getElementById('mapContainer').appendChild(div);
    return div;
}

// 绘制路线
function drawRoute(fromName, toName) {
    const from = LOCATION_COORDS[fromName];
    const to = LOCATION_COORDS[toName];
    if(!from || !to) return;

    const layer = document.getElementById('routeLayer');
    const line = document.createElement('div');
    line.className = 'route-line';

    const container = document.querySelector('.airport-map-container');
    const rect = container.getBoundingClientRect();
    
    const fx = parseFloat(from.left);
    const fy = parseFloat(from.top);
    const tx = parseFloat(to.left);
    const ty = parseFloat(to.top);

    // 转换为像素
    const fromX = fx / 100 * rect.width;
    const fromY = fy / 100 * rect.height;
    const toX = tx / 100 * rect.width;
    const toY = ty / 100 * rect.height;

    const length = Math.hypot(toX - fromX, toY - fromY);
    const angle = Math.atan2(toY - fromY, toX - fromX) * 180 / Math.PI;

    line.style.left = fromX + 'px';
    line.style.top = fromY + 'px';
    line.style.width = length + 'px';
    line.style.transform = `rotate(${angle}deg)`;
    layer.appendChild(line);

    setTimeout(()=>line.classList.add('show'), 200);
}
