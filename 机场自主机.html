<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>机场语音助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }

    html,
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #e0f7fa 0%, #81d4fa 100%);
    }

    .container {
      width: 100vw;
      height: 100vh;
      display: flex;
      padding: 20px;
      gap: 20px;
      position: relative;
    }

    .top-bar {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 15px;
      z-index: 10;
    }

    .top-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: white;
      background: #2196f3;
    }

    .left-panel {
      flex: 1;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 30px;
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 32px;
      color: #1976d2;
      text-align: center;
      margin-bottom: 20px;
    }

    .func-section {
      flex: 1;
      margin-bottom: 20px;
    }

    .map-section {
      flex: 1;
      margin-bottom: 20px;
    }

    .func-grid {
      height: 100%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 12px;
    }

    .func-btn-checkin {
      grid-column: span 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #ff9800, #ff5722);
      color: white;
    }

    .func-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #2196f3, #1976d2);
      color: white;
    }

    .func-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }

    .func-text {
      font-size: 17px;
      font-weight: 500;
    }

    .map-panel {
      height: 100%;
      background: #fff;
      border-radius: 15px;
      padding: 15px;
      position: relative;
      border: 1px solid #e3f2fd;
    }

    .map-title {
      font-size: 19px;
      color: #1976d2;
      text-align: center;
      margin-bottom: 8px;
    }

    .airport-map {
      width: 100%;
      height: 100%;
      background: url("https://picsum.photos/id/141/1200/800") center/cover no-repeat;
      border-radius: 10px;
      position: relative;
    }

    .route-point {
      position: absolute;
      width: 14px;
      height: 14px;
      background: #f44336;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
    }

    .route-point.active {
      animation: routeAnimate 3s forwards;
    }

    @keyframes routeAnimate {
      10% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.2);
      }

      90% {
        opacity: 1;
      }
    }

    .ctrl-btns {
      display: flex;
      gap: 15px;
      justify-content: center;
      align-items: center;
      height: 70px;
    }

    .ctrl-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 17px;
    }

    .stop-btn {
      background: #f44336;
    }

    .clear-btn {
      background: #607d8b;
    }

    .mic-btn-ctrl {
      width: 65px;
      height: 65px;
      border-radius: 50%;
      background: #2196f3;
      color: white;
      font-size: 28px;
      border: none;
      cursor: pointer;
    }

    .mic-btn-ctrl.active {
      background: #f44336;
      transform: scale(1.08);
    }

    .right-panel {
      width: 460px;
    }

    .chat-box {
      height: 100%;
      background: #f8f9fa;
      border-radius: 20px;
      padding: 25px;
      overflow-y: auto;
    }

    .chat-bubble {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 18px;
      margin: 10px 0;
      font-size: 16px;
      line-height: 1.6;
    }

    .user-bubble {
      background: #2196f3;
      color: white;
      margin-left: auto;
    }

    .system-bubble {
      background: white;
      color: #333;
      margin-right: auto;
    }
  </style>
</head>

<body>

  <div class="top-bar">
    <button class="top-btn" id="langBtn">中文 / English</button>
  </div>

  <div class="container">
    <div class="left-panel">
      <div class="title">✈️ 机场语音助手</div>

      <div class="func-section">
        <div class="func-grid">
          <button class="func-btn-checkin" data-cmd="checkin">
            <div class="func-icon">🛄</div>
            <div class="func-text">值机</div>
          </button>
          <button class="func-btn" data-cmd="security">
            <div class="func-icon">🔍</div>
            <div class="func-text">安检</div>
          </button>
          <button class="func-btn" data-cmd="gate">
            <div class="func-icon">🚪</div>
            <div class="func-text">登机口</div>
          </button>
          <button class="func-btn" data-cmd="restaurant">
            <div class="func-icon">🍽️</div>
            <div class="func-text">餐厅</div>
          </button>
          <button class="func-btn" data-cmd="baggage">
            <div class="func-icon">🧳</div>
            <div class="func-text">行李</div>
          </button>
          <button class="func-btn" data-cmd="toilet">
            <div class="func-icon">🚻</div>
            <div class="func-text">卫生间</div>
          </button>
          <button class="func-btn" data-cmd="shop">
            <div class="func-icon">🛍️</div>
            <div class="func-text">免税店</div>
          </button>
          <button class="func-btn" data-cmd="transport">
            <div class="func-icon">🚌</div>
            <div class="func-text">交通</div>
          </button>
          <button class="func-btn" data-cmd="lost">
            <div class="func-icon">🔎</div>
            <div class="func-text">失物招领</div>
          </button>
          <button class="func-btn" data-cmd="special">
            <div class="func-icon">👴</div>
            <div class="func-text">特殊旅客</div>
          </button>
          <button class="func-btn" data-cmd="waiting">
            <div class="func-icon">⏳</div>
            <div class="func-text">候机区</div>
          </button>
        </div>
      </div>

      <div class="map-section">
        <div class="map-panel">
          <div class="map-title">机场地图</div>
          <div class="airport-map">
            <div class="route-point" style="top:30%;left:20%" id="p1"></div>
            <div class="route-point" style="top:50%;left:50%" id="p2"></div>
            <div class="route-point" style="top:70%;left:80%" id="p3"></div>
          </div>
        </div>
      </div>

      <div class="ctrl-btns">
        <button class="ctrl-btn stop-btn">⏹️ 停止播报</button>
        <button class="mic-btn-ctrl" id="micBtn">🎤</button>
        <button class="ctrl-btn clear-btn">🗑️ 清空记录</button>
      </div>
    </div>

    <div class="right-panel">
      <div class="chat-box" id="chatBox">
        <div class="chat-bubble system-bubble">您好！我是机场语音助手，长按麦克风说话，松手结束。</div>
      </div>
    </div>
  </div>

  <script>
    const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
    let rec = null;
    let isSpeaking = false;
    let finalText = "";
    let micAllowed = false;

    // 初始化语音（只在第一次长按触发权限）
    function initRecOnce() {
      if (rec) return;
      rec = new Rec();
      rec.lang = "zh-CN";
      rec.continuous = false;
      rec.interimResults = true;
      rec.onresult = (e) => {
        if (isSpeaking) return;
        let t = "";
        for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;
        finalText = t.trim();
        if (e.results[0].isFinal) doRecognize(finalText);
      };
      rec.onend = () => { };
      micAllowed = true;
    }

    const intentMap = {
      toilet: ["厕所", "卫生间", "上厕所", "方便", "尿急"],
      restaurant: ["吃饭", "肚子饿", "餐厅", "吃东西"],
      checkin: ["值机", "登机牌", "托运行李"],
      security: ["安检"],
      gate: ["登机口", "登机"],
      lost: ["丢东西", "遗失"],
      baggage: ["行李", "箱子"],
      shop: ["商店", "免税店"],
      transport: ["大巴", "地铁", "出租车", "怎么走"],
      waiting: ["休息", "候机"],
      special: ["老人", "小孩", "轮椅"]
    };

    const answer = {
      toilet: "卫生间在您右前方50米，二楼也有。",
      restaurant: "餐厅位于二楼，营业时间6:00-22:00。",
      checkin: "值机柜台在3号门，请提前2小时办理。",
      security: "安检通道在值机柜台后方，请取出电脑与充电宝。",
      gate: "您的登机口是A12，请在起飞前30分钟到达。",
      lost: "失物招领处在一楼服务台旁边。",
      baggage: "行李提取区在一楼，请按航班号查找转盘。",
      shop: "免税店在二楼候机区，可使用支付宝/微信。",
      transport: "机场大巴在1号门，出租车在2号门，地铁在B1层。",
      waiting: "候机区就在登机口旁，配有充电桩与饮水机。",
      special: "特殊旅客服务柜台在值机大厅右侧。",
      unknown: "抱歉，我没太明白，请再说一遍。"
    };

    function doRecognize(text) {
      addMsg(text, "user");
      let target = "unknown";
      for (let key in intentMap) {
        for (let w of intentMap[key]) {
          if (text.includes(w)) {
            target = key;
            break;
          }
        }
        if (target != "unknown") break;
      }
      const rep = answer[target];
      addMsg(rep, "system");
      speak(rep);
      if (["toilet", "security", "checkin", "gate"].includes(target)) showRoute(target);
    }

    function speak(text) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "zh-CN";
      isSpeaking = true;
      u.onstart = () => { isSpeaking = true; }
      u.onend = () => { isSpeaking = false; }
      window.speechSynthesis.speak(u);
    }

    function addMsg(text, type) {
      const c = document.getElementById("chatBox");
      const d = document.createElement("div");
      d.className = "chat-bubble " + type + "-bubble";
      d.innerText = text;
      c.appendChild(d);
      c.scrollTop = c.scrollHeight;
    }

    function showRoute(typ) {
      const a = [p1, p2, p3];
      a.forEach(i => i.classList.remove("active"));
      if (typ == "security") {
        setTimeout(() => a[0].classList.add("active"), 0);
        setTimeout(() => a[1].classList.add("active"), 1000);
        setTimeout(() => a[2].classList.add("active"), 2000);
      } else if (typ == "toilet") {
        setTimeout(() => a[0].classList.add("active"), 0);
        setTimeout(() => a[1].classList.add("active"), 1200);
      } else if (typ == "checkin") {
        setTimeout(() => a[1].classList.add("active"), 0);
      } else if (typ == "gate") {
        setTimeout(() => a[1].classList.add("active"), 0);
        setTimeout(() => a[2].classList.add("active"), 1500);
      }
    }

    // ==================== 关键修复：只弹一次权限 ====================
    window.onload = () => {
      const micBtn = document.getElementById("micBtn");

      // 第一次按 → 初始化并请求权限
      micBtn.onmousedown = micBtn.ontouchstart = () => {
        try {
          if (!micAllowed) initRecOnce();
          micBtn.classList.add("active");
          rec.start();
        } catch (e) { }
      };

      micBtn.onmouseup = micBtn.onmouseleave = micBtn.ontouchend = () => {
        micBtn.classList.remove("active");
        if (rec) rec.stop();
      };

      document.querySelector(".stop-btn").onclick = () => {
        window.speechSynthesis.cancel();
        isSpeaking = false;
      };

      document.querySelector(".clear-btn").onclick = () => {
        document.getElementById("chatBox").innerHTML = `<div class="chat-bubble system-bubble">您好！我是机场语音助手，长按麦克风说话，松手结束。</div>`;
      };

      document.querySelectorAll(".func-btn, .func-btn-checkin").forEach(btn => {
        btn.onclick = () => {
          const cmd = btn.dataset.cmd;
          addMsg(btn.querySelector(".func-text").innerText, "user");
          const rep = answer[cmd];
          addMsg(rep, "system");
          speak(rep);
          if (["toilet", "security", "checkin", "gate"].includes(cmd)) showRoute(cmd);
        };
      });
    };
  </script>
</body>

</html>
